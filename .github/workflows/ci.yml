name: ci

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  eslint:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [18]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node env
        uses: actions/setup-node@v2.1.2
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}   

  unit-tests:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [18]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node env
        uses: actions/setup-node@v2.1.2
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies Frontend
        run: npm ci

      - name: Test Frontend
        run: npm run test
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}   
  e2e:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node env
        uses: actions/setup-node@v2.1.2

      - name: Install dependencies Frontend
        run: npm ci

      - name: Build Frontend
        run: npm run build  # Если у вас есть команда сборки

      - name: Start Server
        run: npm start &  # Запуск сервера в фоновом режиме

      - name: Wait for Server
        run: |
          while ! nc -z localhost 3000; do
            sleep 1
          done

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          record: true  # Запись тестов в Cypress Dashboard (опционально)
          parallel: true  # Параллельное выполнение тестов (опционально)
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}  # Ключ для записи тестов в Cypress Dashboard (опционально)
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}